  # Truyền thuyết bên trong /pwarp GUI
  # Trình giữ chỗ có thể có:
  #   %owner-name% - tên của người chơi sở hữu pwarp này
  #   %visits% - số lượt truy cập mọi lúc
  #   %today% - tham dự trong 1 ngày
  #   %stars% - rút thăm các ngôi sao theo đánh giá (★☆☆☆☆ - ★★★★★)
  #   %voters% - có bao nhiêu người chơi bình chọn
  #   %ratings% - xếp hạng theo số (1 - 5)
  #   %lore% - truyền thuyết về pwarp của người chơi
  #   %status% - hiển thị trạng thái của pwarp
  #   %creationDate% - khi pwarp được tạo
  #   %world% - nơi đặt pwarp
