  # Truyền thuyết bên trong GUI /pwarp
  # Trình giữ chỗ có thể có:
  #   %owner-name% - the name of the người chơi that own this pwarp
  #   %visits% - số lượt truy cập mọi lúc
  #   %today% - tham dự sau 1 ngày
  #   %stars% - rút ra các ngôi sao theo xếp hạng (★☆☆☆☆ - ★★★★★)
  #   %voters% - how many người chơi voted
  #   %ratings% - xếp hạng theo số (1 - 5)
  #   %lore% - lore of người chơi's pwarp
  #   %status% - hiển thị trạng thái của pwarp
  #   %creationDate% - khi pwarp được tạo
  #   %world% - nơi pwarp tọa lạc
