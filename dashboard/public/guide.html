<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hướng dẫn - Plugin Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <!-- Marked.js for markdown parsing -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    .docs-layout {
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 24px;
    }

    .docs-nav {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-lg);
      padding: 16px;
      position: sticky;
      top: 32px;
      max-height: calc(100vh - 120px);
      overflow-y: auto;
    }

    .docs-nav-title {
      font-size: 14px;
      font-weight: 600;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border-color);
      margin-bottom: 16px;
    }

    .doc-nav-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      border-radius: var(--radius-md);
      cursor: pointer;
      transition: all var(--transition-fast);
      color: var(--text-secondary);
      font-size: 13px;
    }

    .doc-nav-item:hover {
      background: var(--bg-hover);
      color: var(--text-primary);
    }

    .doc-nav-item.active {
      background: rgba(0, 212, 255, 0.1);
      color: var(--accent-primary);
    }

    .doc-nav-item svg {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
    }

    .doc-content {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-lg);
      padding: 32px;
      min-height: 400px;
    }

    .doc-content h1 {
      font-size: 28px;
      margin-bottom: 24px;
      padding-bottom: 16px;
      border-bottom: 2px solid var(--accent-primary);
    }

    .doc-content h2 {
      font-size: 22px;
      margin-top: 32px;
      margin-bottom: 16px;
      color: var(--accent-primary);
    }

    .doc-content h3 {
      font-size: 18px;
      margin-top: 24px;
      margin-bottom: 12px;
    }

    .doc-content p {
      margin-bottom: 16px;
      line-height: 1.8;
      color: var(--text-secondary);
    }

    .doc-content ul, .doc-content ol {
      margin-bottom: 16px;
      padding-left: 24px;
    }

    .doc-content li {
      margin-bottom: 8px;
      color: var(--text-secondary);
    }

    .doc-content strong {
      color: var(--text-primary);
    }

    .doc-content code {
      background: var(--bg-secondary);
      padding: 2px 6px;
      border-radius: 4px;
      font-family: var(--font-mono);
      font-size: 13px;
      color: var(--accent-primary);
    }

    .doc-content pre {
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      padding: 16px;
      overflow-x: auto;
      margin-bottom: 16px;
    }

    .doc-content pre code {
      background: transparent;
      padding: 0;
      color: var(--text-primary);
    }

    .doc-content hr {
      border: none;
      border-top: 1px solid var(--border-color);
      margin: 32px 0;
    }

    .doc-content table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 16px;
    }

    .doc-content th, .doc-content td {
      padding: 12px;
      text-align: left;
      border: 1px solid var(--border-color);
    }

    .doc-content th {
      background: var(--bg-secondary);
      font-weight: 600;
    }

    .doc-content a {
      color: var(--accent-primary);
      text-decoration: underline;
    }

    .doc-content blockquote {
      border-left: 4px solid var(--accent-primary);
      padding-left: 16px;
      margin: 16px 0;
      color: var(--text-secondary);
      font-style: italic;
    }

    .loading-text {
      color: var(--text-muted);
      font-size: 14px;
      text-align: center;
      padding: 40px;
    }
  </style>
</head>
<body>
  <div class="dashboard">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-logo">
        <h2>Plugin Dashboard</h2>
      </div>
      
      <nav class="sidebar-nav">
        <a href="/home" class="nav-item">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
            <polyline points="9 22 9 12 15 12 15 22"/>
          </svg>
          Trang chủ
        </a>
        <a href="/storage" class="nav-item">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
          </svg>
          Kho lưu trữ
        </a>
        <a href="/statistics" class="nav-item">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="20" x2="18" y2="10"/>
            <line x1="12" y1="20" x2="12" y2="4"/>
            <line x1="6" y1="20" x2="6" y2="14"/>
          </svg>
          Thống kê
        </a>
        <a href="/guide" class="nav-item active">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
            <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
          </svg>
          Hướng dẫn
        </a>
      </nav>
      
      <div class="sidebar-footer">
        <div class="user-info">
          <div class="user-avatar">A</div>
          <div>
            <div class="user-name">Admin</div>
            <div class="user-role">Quản trị viên</div>
          </div>
        </div>
        <button class="btn btn-secondary btn-sm" style="width: 100%;" onclick="logout()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
            <polyline points="16 17 21 12 16 7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
          Đăng xuất
        </button>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <div class="page-header">
        <h1 class="page-title">Tài liệu hướng dẫn</h1>
      </div>

      <div class="docs-layout">
        <!-- Docs Navigation -->
        <div class="docs-nav">
          <div class="docs-nav-title">Danh sách tài liệu</div>
          <div id="docsNav">
            <div class="loading-text">Đang tải...</div>
          </div>
        </div>

        <!-- Doc Content -->
        <div class="doc-content" id="docContent">
          <div class="loading-text">Chọn một tài liệu để xem</div>
        </div>
      </div>
    </main>
  </div>

  <script>
    let docs = [];
    let currentDoc = null;

    // Auth check
    async function checkAuth() {
      const res = await fetch('/api/auth/status');
      const data = await res.json();
      if (!data.authenticated) {
        window.location.href = '/';
      }
    }

    // Logout
    async function logout() {
      await fetch('/api/logout', { method: 'POST' });
      window.location.href = '/';
    }

    // Load docs
    async function loadDocs() {
      try {
        const res = await fetch('/api/docs');
        docs = await res.json();
        renderDocsNav();
        
        // Auto select first doc
        if (docs.length > 0) {
          selectDoc(0);
        }
      } catch (e) {
        console.error('Load docs error:', e);
        document.getElementById('docsNav').innerHTML = '<div class="loading-text">Không thể tải tài liệu</div>';
      }
    }

    // Render docs navigation
    function renderDocsNav() {
      const nav = document.getElementById('docsNav');
      
      if (docs.length === 0) {
        nav.innerHTML = '<div class="loading-text">Chưa có tài liệu</div>';
        return;
      }

      nav.innerHTML = docs.map((doc, index) => `
        <div class="doc-nav-item ${currentDoc === index ? 'active' : ''}" onclick="selectDoc(${index})">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
            <line x1="16" y1="13" x2="8" y2="13"/>
            <line x1="16" y1="17" x2="8" y2="17"/>
          </svg>
          ${doc.title}
        </div>
      `).join('');
    }

    // Select and display doc
    function selectDoc(index) {
      currentDoc = index;
      renderDocsNav();
      
      const doc = docs[index];
      const content = document.getElementById('docContent');
      
      // Parse markdown to HTML
      const html = marked.parse(doc.content);
      content.innerHTML = html;
    }

    // Init
    checkAuth();
    loadDocs();
  </script>
</body>
</html>
