<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giveaway Random - Quay Số May Mắn</title>
    <meta name="description" content="Ứng dụng quay số may mắn cho giveaway, sự kiện và minigame">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="mobile.css">
    <link rel="stylesheet" href="fixes.css">
</head>
<body>
    <!-- Animated Background -->
    <div class="background-animation">
        <div class="floating-shapes">
            <span></span><span></span><span></span><span></span><span></span>
            <span></span><span></span><span></span><span></span><span></span>
        </div>
    </div>

    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="logo">
                <span class="logo-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="2" y="2" width="20" height="20" rx="2"/>
                        <circle cx="8" cy="8" r="1.5" fill="currentColor"/>
                        <circle cx="16" cy="8" r="1.5" fill="currentColor"/>
                        <circle cx="8" cy="16" r="1.5" fill="currentColor"/>
                        <circle cx="16" cy="16" r="1.5" fill="currentColor"/>
                        <circle cx="12" cy="12" r="1.5" fill="currentColor"/>
                    </svg>
                </span>
                <h1>Giveaway Random</h1>
            </div>
            <p class="tagline">Quay số may mắn - Công bằng & Minh bạch</p>
        </header>

        <!-- Server Info Card -->
        <section class="server-info-card glass-card">
            <div class="server-icon-wrapper">
                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="server-icon">
                    <rect x="2" y="2" width="20" height="8" rx="2" ry="2"></rect>
                    <rect x="2" y="14" width="20" height="8" rx="2" ry="2"></rect>
                    <line x1="6" y1="6" x2="6.01" y2="6"></line>
                    <line x1="6" y1="18" x2="6.01" y2="18"></line>
                </svg>
            </div>
            <div class="server-details">
                <span class="server-label">SERVER MINECRAFT</span>
                <div class="server-address" id="serverAddress" onclick="copyServerIP()">
                    <span class="ip-text">stardust.pikamc.vn</span>
                    <span class="port-text">:26033</span>
                    <span class="copy-hint">
                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                        </svg>
                        Copy IP
                    </span>
                </div>
            </div>
            <div class="server-status">
                <span class="status-dot"></span>
                Online
            </div>
        </section>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Settings Panel -->
            <section class="settings-panel glass-card" id="settingsPanel">
                <div class="settings-header" id="settingsToggle">
                    <h2>
                        <svg class="section-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="3"/>
                            <path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/>
                        </svg>
                        Cài Đặt Giveaway
                    </h2>
                    <button class="btn-icon-toggle">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="6 9 12 15 18 9"></polyline>
                        </svg>
                    </button>
                </div>
                <div class="settings-content" id="settingsContent">
                    <div class="settings-grid">
                        <div class="setting-item">
                            <label for="minNumber">Số nhỏ nhất</label>
                            <input type="number" id="minNumber" value="1" min="1">
                        </div>
                        <div class="setting-item">
                            <label for="maxNumber">Số lớn nhất</label>
                            <input type="number" id="maxNumber" value="100" min="1">
                        </div>
                        <div class="setting-item">
                            <label for="winnersCount">Số người thắng</label>
                            <input type="number" id="winnersCount" value="2" min="1" max="10">
                        </div>
                        <div class="setting-item">
                            <label for="prizeName">Tên giải thưởng</label>
                            <input type="text" id="prizeName" placeholder="VD: Nitro Discord">
                        </div>
                    </div>
                </div>
            </section>

            <!-- Two Column Layout -->
            <div class="two-columns">
                <!-- Join Panel -->
                <section class="join-panel glass-card">
                    <h2>
                        <svg class="section-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
                        </svg>
                        Tham Gia Giveaway
                    </h2>
                    <form id="joinForm" class="join-form">
                        <div class="form-group">
                            <label for="playerName">Tên của bạn</label>
                            <input type="text" id="playerName" placeholder="Nhập tên..." required>
                        </div>
                        <div class="form-group">
                            <label>Chọn số may mắn: <span id="selectedNumber" class="selected-number">?</span></label>
                            <div class="number-picker">
                                <button type="button" id="randomBtn" class="btn btn-random">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                        <rect x="2" y="2" width="20" height="20" rx="2"/>
                                        <circle cx="8" cy="8" r="1.5" fill="currentColor"/>
                                        <circle cx="16" cy="16" r="1.5" fill="currentColor"/>
                                    </svg>
                                    Random Số
                                </button>
                                <span class="or-text">hoặc</span>
                                <input type="number" id="manualNumber" placeholder="Nhập số...">
                            </div>
                        </div>
                        <button type="submit" class="btn btn-join" id="joinBtn">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M20 12v6a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h6"/>
                                <path d="M12 12L22 2"/>
                                <path d="M16 2h6v6"/>
                            </svg>
                            Tham Gia Ngay
                        </button>
                    </form>
                </section>

                <!-- Participants Panel -->
                <section class="participants-panel glass-card">
                    <h2>
                        <svg class="section-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                            <circle cx="9" cy="7" r="4"/>
                            <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
                            <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
                        </svg>
                        Người Tham Gia 
                        <span class="participant-count" id="participantCount">0</span>
                    </h2>
                    <div class="participants-list" id="participantsList">
                        <div class="empty-state">
                            <svg class="empty-icon" xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                                <circle cx="12" cy="12" r="10"/>
                                <path d="M8 15h8"/>
                                <circle cx="9" cy="9" r="1" fill="currentColor"/>
                                <circle cx="15" cy="9" r="1" fill="currentColor"/>
                            </svg>
                            <p>Chưa có ai tham gia</p>
                            <small>Hãy là người đầu tiên!</small>
                        </div>
                    </div>
                    <button class="btn btn-clear" id="clearBtn">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M3 6h18"/>
                            <path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/>
                            <path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/>
                            <line x1="10" y1="11" x2="10" y2="17"/>
                            <line x1="14" y1="11" x2="14" y2="17"/>
                        </svg>
                        Xóa Tất Cả
                    </button>
                </section>
            </div>

            <!-- Spin Section -->
            <section class="spin-section glass-card">
                <h2>
                    <svg class="section-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"/>
                        <path d="M12 6v6l4 2"/>
                    </svg>
                    Quay Số May Mắn
                </h2>
                <div class="spin-container">
                    <div class="spin-display" id="spinDisplay">
                        <div class="spin-number" id="spinNumber">?</div>
                        <div class="spin-ring"></div>
                        <div class="spin-ring ring-2"></div>
                        <div class="spin-ring ring-3"></div>
                    </div>
                    <button class="btn btn-spin" id="spinBtn">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M4.5 16.5c-1.5 1.26-2 5-2 5s3.74-.5 5-2c.71-.84.7-2.13-.09-2.91a2.18 2.18 0 0 0-2.91-.09z"/>
                            <path d="m12 15-3-3a22 22 0 0 1 2-3.95A12.88 12.88 0 0 1 22 2c0 2.72-.78 7.5-6 11a22.35 22.35 0 0 1-4 2z"/>
                            <path d="M9 12H4s.55-3.03 2-4c1.62-1.08 5 0 5 0"/>
                            <path d="M12 15v5s3.03-.55 4-2c1.08-1.62 0-5 0-5"/>
                        </svg>
                        BẮT ĐẦU QUAY
                    </button>
                </div>
            </section>

            <!-- Winners Section -->
            <section class="winners-section glass-card hidden" id="winnersSection">
                <h2>
                    <svg class="section-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/>
                        <path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/>
                        <path d="M4 22h16"/>
                        <path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/>
                        <path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/>
                        <path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/>
                    </svg>
                    Người Thắng Cuộc
                </h2>
                <div class="winners-grid" id="winnersList"></div>
                <button class="btn btn-new-round" id="newRoundBtn">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"/>
                        <path d="M21 3v5h-5"/>
                    </svg>
                    Bắt Đầu Vòng Mới
                </button>
            </section>
        </main>

        <!-- Footer -->
        <footer class="footer">
            <p>Made with 
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="#ef4444" stroke="#ef4444" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align: middle;">
                    <path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/>
                </svg>
                for Giveaway Events
            </p>
        </footer>
    </div>

    <!-- Confetti Container -->
    <div id="confettiContainer"></div>

    <!-- Sound Effects (optional) -->
    <audio id="spinSound" preload="auto">
        <source src="https://assets.mixkit.co/active_storage/sfx/2003/2003-preview.mp3" type="audio/mpeg">
    </audio>
    <audio id="winSound" preload="auto">
        <source src="https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3" type="audio/mpeg">
    </audio>

    <script src="script.js"></script>
</body>
</html>
